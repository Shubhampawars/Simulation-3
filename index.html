<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scenic Driver - Nature & Animals</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #a3e4ff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            user-select: none;
            touch-action: none;
        }
        #ui {
            position: absolute; 
            top: 5%; 
            left: 5%; 
            color: white;
            background: rgba(0,0,0,0.7); 
            padding: 15px 25px; 
            border-radius: 12px;
            border-left: 6px solid #ffdd00; 
            pointer-events: none; 
            z-index: 100;
        }
        #hardware-toast {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            display: none;
            z-index: 1000;
        }
        .controls {
            position: absolute; 
            bottom: 8%; 
            width: 100%;
            display: flex; 
            justify-content: space-between; 
            padding: 0 5%; 
            box-sizing: border-box;
            z-index: 100;
        }
        .btn-group { display: flex; gap: 20px; align-items: flex-end; }
        .btn {
            width: 80px; height: 80px; 
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.8); 
            border-radius: 50%; color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; cursor: pointer;
        }
        .pedal { width: 110px; height: 70px; border-radius: 15px; font-size: 16px; }
        #gas { background: rgba(46, 204, 113, 0.4); border-color: #2ecc71; }
        #brake { background: rgba(231, 76, 60, 0.4); border-color: #e74c3c; }
    </style>
</head>
<body>

    <div id="hardware-toast">STEERING WHEEL CONNECTED</div>
    <div id="ui">
        <div style="font-size: 12px; letter-spacing: 2px; opacity: 0.8; margin-bottom: 5px;">TOUR DISTANCE</div>
        <div id="score" style="font-size: 28px; font-weight: bold;">0 m</div>
        <div id="speedDisp" style="font-size: 20px; color: #ffdd00; margin-top: 5px; font-weight: 600;">0 km/h</div>
    </div>

    <div class="controls">
        <div class="btn-group"><div class="btn" id="leftBtn">◀</div><div class="btn" id="rightBtn">▶</div></div>
        <div class="btn-group"><div class="btn pedal" id="brake">BRAKE</div><div class="btn pedal" id="gas">GAS</div></div>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa3e4ff);
        scene.fog = new THREE.Fog(0xa3e4ff, 70, 250);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 2, -15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const sun = new THREE.Group();
        sun.add(new THREE.Mesh(new THREE.SphereGeometry(10, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffdd00 })));
        sun.position.set(-70, 70, -250);
        scene.add(sun);

        const road = new THREE.Mesh(new THREE.PlaneGeometry(22, 2000), new THREE.MeshPhongMaterial({ color: 0x3d3d3d }));
        road.rotation.x = -Math.PI / 2;
        scene.add(road);

        const grass = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({ color: 0x4caf50 }));
        grass.rotation.x = -Math.PI / 2; grass.position.y = -0.1;
        scene.add(grass);

        const laneLines = [];
        for(let i = 0; i < 40; i++) {
            [-4, 4].forEach(x => {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 6), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                line.rotation.x = -Math.PI/2; line.position.set(x, 0.05, -i * 20);
                scene.add(line); laneLines.push(line);
            });
        }

        // --- TREES (Circle & Conical) ---
        const trees = [];
        for(let i=0; i<40; i++) {
            const tree = new THREE.Group();
            tree.add(new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 3), new THREE.MeshPhongMaterial({color: 0x3e2723})));
            
            let leaves;
            if (i % 2 === 0) { // Circle Tree
                leaves = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 8), new THREE.MeshPhongMaterial({color: 0x2e7d32}));
                leaves.position.y = 3.5;
            } else { // Conical Tree
                leaves = new THREE.Mesh(new THREE.CylinderGeometry(0, 2.5, 6, 8), new THREE.MeshPhongMaterial({color: 0x1b5e20}));
                leaves.position.y = 3.5;
            }
            tree.add(leaves);
            tree.position.set(Math.random() > 0.5 ? 20 + Math.random()*10 : -20 - Math.random()*10, 1.5, -i * 25);
            scene.add(tree); trees.push(tree);
        }

        // --- ANIMALS ---
        const animals = [];
        for(let i=0; i<10; i++) {
            const animal = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.8, 1.8), new THREE.MeshPhongMaterial({color: 0xf5f5f5}));
            body.position.y = 0.8;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshPhongMaterial({color: 0xf5f5f5}));
            head.position.set(0, 1.4, 0.8);
            animal.add(body, head);
            animal.position.set(Math.random() > 0.5 ? 35 : -35, 0, -i * 60);
            scene.add(animal); animals.push(animal);
        }

        const clouds = [];
        for(let i=0; i<15; i++) {
            const cloud = new THREE.Mesh(new THREE.SphereGeometry(5, 7, 7), new THREE.MeshLambertMaterial({color:0xffffff, transparent:true, opacity:0.8}));
            cloud.scale.set(2, 0.6, 1.2); cloud.position.set((Math.random()-0.5)*150, 40 + Math.random()*20, -i * 60);
            scene.add(cloud); clouds.push(cloud);
        }

        // --- CAR BUILDER (WITH TYRES) ---
        function createCar(color) {
            const car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1, 5), new THREE.MeshPhongMaterial({color}));
            body.position.y = 0.8;
            const glass = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.8, 2.5), new THREE.MeshPhongMaterial({color: 0x1a1a1a}));
            glass.position.set(0, 1.6, -0.2);
            
            car.userData.tyres = [];
            const tyreGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 16);
            const tyreMat = new THREE.MeshPhongMaterial({color: 0x333333});
            const tyreCoords = [[-1.3, 0.5, 1.5], [1.3, 0.5, 1.5], [-1.3, 0.5, -1.5], [1.3, 0.5, -1.5]];
            tyreCoords.forEach(pos => {
                const tyre = new THREE.Mesh(tyreGeo, tyreMat);
                tyre.rotation.z = Math.PI / 2;
                tyre.position.set(...pos);
                car.add(tyre);
                car.userData.tyres.push(tyre);
            });
            car.add(body, glass);
            return car;
        }

        const player = createCar(0xd32f2f);
        scene.add(player);

        const npcs = [];
        const npcColors = [0x1976d2, 0xffa000, 0x7b1fa2, 0x00796b];
        for(let i=0; i<4; i++) {
            const npc = createCar(npcColors[i%4]);
            npc.position.set((Math.random()-0.5)*15, 0, -80 - (i*80));
            scene.add(npc); npcs.push(npc);
        }

        let speed = 0, distance = 0, hardwareSteer = 0, targetRotation = 0;
        const activeKeys = new Set();

        window.addEventListener("gamepadconnected", () => {
            const toast = document.getElementById('hardware-toast');
            toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 3000);
        });

        const inputHandler = (id, key) => {
            const el = document.getElementById(id);
            el.onmousedown = el.ontouchstart = (e) => { e.preventDefault(); activeKeys.add(key); };
            el.onmouseup = el.ontouchend = (e) => { e.preventDefault(); activeKeys.delete(key); };
        };
        inputHandler('gas', 'w'); inputHandler('brake', 's'); inputHandler('leftBtn', 'a'); inputHandler('rightBtn', 'd');

        window.addEventListener('keydown', (e) => activeKeys.add(e.key.toLowerCase()));
        window.addEventListener('keyup', (e) => activeKeys.delete(e.key.toLowerCase()));

        function animate() {
            requestAnimationFrame(animate);

            const gp = navigator.getGamepads()[0];
            if (gp) {
                hardwareSteer = gp.axes[0];
                if (gp.buttons[0].pressed) activeKeys.add('w'); else if(!activeKeys.has('arrowup')) activeKeys.delete('w');
                if (gp.buttons[1].pressed) activeKeys.add('s'); else if(!activeKeys.has('arrowdown')) activeKeys.delete('s');
            }

            if (activeKeys.has('w') || activeKeys.has('arrowup')) speed += 0.002;
            else if (activeKeys.has('s') || activeKeys.has('arrowdown')) speed -= 0.01;
            else speed -= 0.001;
            speed = Math.max(0, Math.min(speed, 0.14));

            targetRotation = 0;
            if (activeKeys.has('a') || activeKeys.has('arrowleft')) { player.position.x -= 0.15; targetRotation = 0.25; }
            else if (activeKeys.has('d') || activeKeys.has('arrowright')) { player.position.x += 0.15; targetRotation = -0.25; }
            else if (Math.abs(hardwareSteer) > 0.1) { player.position.x += hardwareSteer * 0.22; targetRotation = -hardwareSteer * 0.35; }
            
            player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, targetRotation, 0.1);
            player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, targetRotation * 0.2, 0.1);
            player.position.x = THREE.MathUtils.clamp(player.position.x, -9, 9);

            const worldStep = speed * 18;
            laneLines.forEach(l => { l.position.z += worldStep; if(l.position.z > 30) l.position.z = -500; });
            trees.forEach(t => { t.position.z += worldStep; if(t.position.z > 30) t.position.z = -500; });
            animals.forEach(a => { a.position.z += worldStep; if(a.position.z > 30) { a.position.z = -600; a.position.x = Math.random() > 0.5 ? 35 : -35; } });
            clouds.forEach(c => { c.position.z += speed * 5; if(c.position.z > 50) c.position.z = -600; });

            // Tyre Spinning Animation
            [player, ...npcs].forEach(car => {
                car.userData.tyres.forEach(tyre => { tyre.rotation.x += speed * 5; });
            });

            npcs.forEach(npc => {
                npc.position.z += (worldStep) - 1.1;
                if(npc.position.z > 40) { npc.position.z = -300; npc.position.x = (Math.random()-0.5) * 16; }
                if(Math.abs(player.position.x - npc.position.x) < 2.4 && Math.abs(player.position.z - npc.position.z) < 5) speed *= 0.85;
            });

            distance += speed;
            document.getElementById('score').innerText = Math.floor(distance) + " m";
            document.getElementById('speedDisp').innerText = Math.round(speed * 178.5) + " km/h";

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
